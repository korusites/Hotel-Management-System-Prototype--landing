services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: hotel
      POSTGRES_PASSWORD: hotel
      POSTGRES_DB: hotel
    ports:
      - "5433:5432"
    volumes:
      - hotel_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hotel"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./backend
    env_file: ./backend/.env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app

volumes:
  hotel_pgdata:
